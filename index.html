<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>藝觀 ARTVUE | 全球歷史與藝術史同步對照年表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f2e8;        /* 宣紙底色 */
    --paper-dark: #e9e3d5;   /* 宣紙陰影與邊框 */
    --ink-dark: #1c1c1c;     /* 濃墨 */
    --ink-mid: #4a4a4a;      /* 中墨 */
    --ink-light: #8c8c8c;    /* 淡墨 */
    --stamp-red: #b22222;    /* 硃砂印泥紅 */
    --cn-color: #8b2020;     /* 中國主題色 */
    --jp-color: #2e4a3d;     /* 日本主題色 */
    --wl-color: #2a3d6b;     /* 世界主題色 */
    --font-serif: 'Noto Serif TC', serif;
    --font-sans: 'Noto Sans TC', sans-serif;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { 
    background-color: var(--paper); color: var(--ink-dark); font-family: var(--font-sans); line-height: 1.6; overflow-x: hidden;
    background-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.01) 0%, rgba(0,0,0,0.02) 100%), 
                      url('data:image/svg+xml;utf8,<svg opacity="0.08" xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)"/></svg>');
  }
  
  /* NAV / Header */
  .nav { 
    position: sticky; top: 0; z-index: 100; background: rgba(246, 242, 232, 0.96); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--ink-light); padding: 14px 20px; display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
  }
  .nav-logo { font-family: var(--font-serif); font-weight: 900; font-size: 24px; color: var(--ink-dark); letter-spacing: 0.1em; display:flex; align-items:center; gap:8px;}
  .nav-logo::before { content: '藝觀'; background: var(--stamp-red); color: #fff; font-size: 12px; padding: 2px 5px; border-radius: 2px; font-weight: bold; }
  .nav-name { font-family: var(--font-sans); font-size: 13px; font-weight: 600; letter-spacing: 0.1em; color: var(--ink-mid); margin-right: auto; }

  /* 導覽列控制項 */
  .lang-grp, .civ-grp { display: flex; }
  .lb, .cb { padding: 6px 14px; font-size: 12px; background: transparent; cursor: pointer; font-family: var(--font-serif); transition: all 0.2s; }
  .lb { border: 1px solid var(--ink-mid); color: var(--ink-mid); }
  .lb:first-child { border-radius: 4px 0 0 4px; }
  .lb:last-child { border-radius: 0 4px 4px 0; border-left: none; }
  .lb.on { background: var(--ink-dark); color: var(--paper); border-color: var(--ink-dark); }
  
  .civ-grp { gap: 8px; margin-left: auto; }
  .cb { border: 1px solid var(--ink-light); border-radius: 4px; color: var(--ink-mid); font-weight: 500; }
  .cb.on { border-color: var(--ink-dark); color: var(--ink-dark); background: rgba(0,0,0,0.06); font-weight: 700;}

  /* Main Container */
  .container { display: flex; flex-direction: column; max-width: 1400px; margin: 0 auto; padding: 20px 16px 80px; }
  @media (min-width: 900px) { .container { flex-direction: row; align-items: flex-start; gap: 40px; padding: 40px 30px 100px; } }

  /* Left: Master Timeline */
  .master-timeline { flex: 0 0 100%; position: relative; padding-left: 15px; margin-bottom: 30px; }
  @media (min-width: 900px) { .master-timeline { flex: 0 0 200px; margin-bottom: 0; position: sticky; top: 100px; } }
  
  .master-timeline::before {
    content: ''; position: absolute; left: 0; top: 10px; bottom: 0; width: 1px;
    background: linear-gradient(to bottom, var(--ink-dark), var(--ink-light) 80%, transparent);
  }

  .time-node { position: relative; padding: 12px 0 12px 20px; cursor: pointer; transition: all 0.3s; opacity: 0.4; }
  .time-node::before {
    content: ''; position: absolute; left: -19px; top: 20px; width: 8px; height: 8px; border-radius: 50%;
    background: var(--paper); border: 1px solid var(--ink-dark); transition: all 0.3s;
  }
  .time-node:hover { opacity: 0.8; }
  .time-node.active { opacity: 1; transform: translateX(6px); }
  .time-node.active::before { background: var(--stamp-red); border-color: var(--stamp-red); box-shadow: 0 0 0 3px rgba(178, 34, 34, 0.2); }
  
  .node-year { font-size: 11px; color: var(--ink-light); font-family: var(--font-sans); }
  .node-title { font-size: 22px; font-weight: 900; font-family: var(--font-serif); margin-top: 2px; color: var(--ink-dark);}

  /* Right: Detail Dashboard */
  .detail-dashboard { flex: 1; width: 100%; display: none; animation: fadeIn 0.4s ease; }
  .detail-dashboard.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .dash-header { margin-bottom: 30px; position: relative; padding-bottom: 16px; }
  .dash-header::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px;
    background: linear-gradient(90deg, var(--ink-dark) 0%, var(--ink-light) 60%, transparent 100%);
  }
  .dash-title { font-family: var(--font-serif); font-size: 34px; color: var(--ink-dark); font-weight: 900; }
  .dash-desc { font-size: 15px; color: var(--ink-mid); margin-top: 10px; text-align: justify; line-height: 1.75; }

  /* Synchronized Timeline Section */
  .sync-section-title { font-family: var(--font-serif); font-size: 22px; font-weight: 900; color: var(--ink-dark); margin: 35px 0 20px; display: flex; align-items: center; gap: 8px;}
  .sync-timeline { display: flex; flex-direction: column; gap: 16px; margin-bottom: 30px; }
  
  .sync-row { 
    display: flex; flex-direction: column; gap: 12px; padding: 16px; 
    background: rgba(255,255,255,0.5); border: 1px solid var(--paper-dark); border-radius: 4px;
  }
  @media (min-width: 768px) {
    .sync-row { flex-direction: row; gap: 24px; align-items: stretch; padding: 20px;}
  }

  .sync-year { 
    font-family: var(--font-serif); font-weight: 900; font-size: 16px; color: var(--stamp-red);
    border-bottom: 1px dashed var(--paper-dark); padding-bottom: 6px;
  }
  @media (min-width: 768px) {
    .sync-year { 
      flex: 0 0 120px; font-size: 15px; text-align: right; border-bottom: none; 
      border-right: 1.5px dashed var(--paper-dark); padding-bottom: 0; padding-right: 20px;
    }
  }

  .sync-events { flex: 1; display: flex; flex-direction: column; gap: 12px; justify-content: center;}
  .s-evt { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; line-height: 1.6; color: var(--ink-dark); }
  .badge { font-size: 11px; padding: 2px 6px; border-radius: 2px; color: #fff; font-weight: 600; white-space: nowrap; margin-top: 2px; font-family: var(--font-sans);}
  .badge.cn { background-color: var(--cn-color); }
  .badge.jp { background-color: var(--jp-color); }
  .badge.wl { background-color: var(--wl-color); }

  /* Arts & Creators Grid (支援動態多欄排版) */
  .art-grid { display: grid; grid-template-columns: 1fr; gap: 24px; margin-top: 15px;}
  @media (min-width: 768px) { .art-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); } }

  .art-col { display: flex; flex-direction: column; gap: 14px; background: rgba(255,255,255,0.3); padding: 20px; border-radius: 4px; border: 1px solid var(--paper-dark); }
  .art-col-title { font-family: var(--font-serif); font-size: 17px; font-weight: 900; border-bottom: 1px solid var(--ink-light); padding-bottom: 8px; margin-bottom: 6px; }
  
  .art-col.cn .art-col-title { color: var(--cn-color); border-color: rgba(139, 32, 32, 0.3); }
  .art-col.jp .art-col-title { color: var(--jp-color); border-color: rgba(46, 74, 61, 0.3); }
  .art-col.wl .art-col-title { color: var(--wl-color); border-color: rgba(42, 61, 107, 0.3); }

  .art-list { display: flex; flex-direction: column; gap: 12px; }
  .art-item { background: var(--paper); border: 1px solid var(--paper-dark); padding: 12px 14px; border-radius: 2px; transition: transform 0.2s; }
  .art-item:hover { transform: translateY(-2px); box-shadow: 2px 4px 12px rgba(0,0,0,0.03); }
  
  .art-item-cat { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 4px; text-transform: uppercase; }
  .art-col.cn .art-item-cat { color: var(--cn-color); }
  .art-col.jp .art-item-cat { color: var(--jp-color); }
  .art-col.wl .art-item-cat { color: var(--wl-color); }
  
  .art-item-text { font-size: 14px; color: var(--ink-dark); font-weight: 700; line-height: 1.4; margin-bottom: 4px;}
  .art-item-works { font-size: 12px; color: var(--ink-mid); line-height: 1.55; border-left: 2px solid var(--ink-light); padding-left: 8px; margin-top: 6px; }

</style>
</head>

// ==========================================
// 核心排版與控制邏輯 (修正資料對應 Bug)
// ==========================================
let lang = 'zh';
let civs = { jp: true, wl: true };
let activeEraId = 'ming';

function init() { 
  setLang('zh'); 
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lb').forEach(b => b.classList.remove('on'));
  document.querySelector(`.lb[onclick="setLang('${l}')"]`).classList.add('on');
  
  // 更新 UI 靜態欄位
  document.getElementById('ui-sub').textContent = UI[l].sub;
  document.querySelector('.cb[data-c="jp"]').textContent = '🇯🇵 ' + UI[l].badge.jp;
  document.querySelector('.cb[data-c="wl"]').textContent = '🌍 ' + UI[l].badge.wl;
  
  renderTimeline();
  selectEra(activeEraId);
}

function toggleCiv(c) {
  civs[c] = !civs[c];
  document.querySelector(`.cb[data-c="${c}"]`).classList.toggle('on', civs[c]);
  selectEra(activeEraId); 
}

function renderTimeline() {
  const tl = document.getElementById('masterTimeline');
  tl.innerHTML = '';
  DATA.forEach(d => {
    const dataL = d[lang];
    const node = document.createElement('div');
    node.className = `time-node ${d.id === activeEraId ? 'active' : ''}`;
    node.id = `node-${d.id}`;
    node.onclick = () => selectEra(d.id);
    
    node.innerHTML = `<div class="node-year">${d.year}</div><div class="node-title">${dataL.name}</div>`;
    tl.appendChild(node);
  });
}

function selectEra(id) {
  activeEraId = id;
  document.querySelectorAll('.time-node').forEach(n => n.classList.remove('active'));
  const activeNode = document.getElementById(`node-${id}`);
  if(activeNode) activeNode.classList.add('active');

  const rawData = DATA.find(e => e.id === id);
  if(!rawData) return;
  
  // 正確提取當前語言的資料包
  const d = rawData[lang];
  const u = UI[lang];

  // 1. 生成大同步時間軸
  const genSyncRows = (syncData) => {
    return syncData.map(row => {
      let evtsHtml = `<div class="s-evt"><span class="badge cn">${u.badge.cn}</span><div>${row.cn}</div></div>`;
      if(civs.jp && row.jp) evtsHtml += `<div class="s-evt"><span class="badge jp">${u.badge.jp}</span><div>${row.jp}</div></div>`;
      if(civs.wl && row.wl) evtsHtml += `<div class="s-evt"><span class="badge wl">${u.badge.wl}</span><div>${row.wl}</div></div>`;
      
      return `
        <div class="sync-row">
          <div class="sync-year">${row.y}</div>
          <div class="sync-events">${evtsHtml}</div>
        </div>
      `;
    }).join('');
  };

  // 2. 生成藝術與創作者項目
  const genArtList = (items) => {
    if(!items || items.length === 0) return `<div style="font-size:12px;color:var(--ink-light);">No data available</div>`;
    return items.map(item => `
      <div class="art-item">
        <div class="art-item-cat">${item.c}</div>
        <div class="art-item-text">${item.t}</div>
        <div class="art-item-works">${item.w}</div>
      </div>
    `).join('');
  };

  const dash = document.getElementById('dashboard');
  dash.classList.remove('show');
  
  setTimeout(() => {
    let html = `
      <div class="dash-header">
        <div class="dash-title">${d.name} <span style="font-size:16px; color:var(--ink-light); font-family:var(--font-sans);">(${rawData.year})</span></div>
        <div class="dash-desc">${d.desc}</div>
      </div>

      <div class="sync-section-title">${u.tSync}</div>
      <div class="sync-timeline">
        ${genSyncRows(d.sync)}
      </div>

      <div class="sync-section-title">${u.tArt}</div>
      <div class="art-grid">
        <div class="art-col cn">
          <div class="art-col-title">${u.badge.cn}</div>
          <div class="art-list">${genArtList(d.art_cn)}</div>
        </div>
    `;

    // 日本藝術欄位 (隨頂部開關連動)
    if(civs.jp) {
      html += `
        <div class="art-col jp">
          <div class="art-col-title">${u.badge.jp}</div>
          <div class="art-list">${genArtList(d.art_jp)}</div>
        </div>
      `;
    }
    
    // 世界藝術欄位 (隨頂部開關連動)
    if(civs.wl) {
      html += `
        <div class="art-col wl">
          <div class="art-col-title">${u.badge.wl}</div>
          <div class="art-list">${genArtList(d.art_wl)}</div>
        </div>
      `;
    }

    html += `</div>`;
    dash.innerHTML = html;
    dash.classList.add('show');
    
    // 手機平板觸控時，平滑滾動到核心區域
    if(window.innerWidth < 900) {
      dash.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 50);
}

// 啟動
init();
</script>
