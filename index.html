<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>藝觀 ARTVUE | 亞洲與世界歷史藝術對照</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #121212;
    --bg-panel: #1e1e1e;
    --bg-hover: #2a2a2a;
    --text-main: #e0e0e0;
    --text-muted: #9e9e9e;
    --gold: #d4af37;
    --cn-color: #c0392b;
    --jp-color: #27ae60;
    --wl-color: #2980b9;
    --font-serif: 'Noto Serif TC', serif;
    --font-sans: 'Noto Sans TC', sans-serif;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background-color: var(--bg-dark); color: var(--text-main); font-family: var(--font-sans); line-height: 1.6; overflow-x: hidden; }
  
  /* Header */
  header { background: rgba(18,18,18,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; padding: 15px 20px; border-bottom: 1px solid #333; text-align: center; }
  header h1 { font-family: var(--font-serif); font-size: 22px; color: var(--gold); letter-spacing: 2px; }
  header p { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

  /* Main Layout */
  .container { display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; padding: 20px; }
  
  @media (min-width: 900px) {
    .container { flex-direction: row; align-items: flex-start; gap: 40px; padding: 40px 20px; }
  }

  /* Left: Master Timeline */
  .master-timeline { flex: 0 0 100%; position: relative; padding-left: 20px; margin-bottom: 30px; }
  @media (min-width: 900px) { .master-timeline { flex: 0 0 250px; margin-bottom: 0; } }
  
  .master-timeline::before {
    content: ''; position: absolute; left: 0; top: 10px; bottom: 0; width: 2px; background: #333;
  }

  .time-node { position: relative; padding: 15px 0 15px 20px; cursor: pointer; transition: all 0.3s; opacity: 0.6; }
  .time-node::before {
    content: ''; position: absolute; left: -25px; top: 22px; width: 12px; height: 12px; border-radius: 50%;
    background: var(--bg-dark); border: 2px solid #555; transition: all 0.3s;
  }
  .time-node:hover { opacity: 1; }
  .time-node.active { opacity: 1; }
  .time-node.active::before { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.5); }
  
  .node-year { font-size: 12px; color: var(--gold); font-family: var(--font-serif); letter-spacing: 1px; }
  .node-title { font-size: 20px; font-weight: 700; font-family: var(--font-serif); margin-top: 2px; }

  /* Right: Detail Dashboard */
  .detail-dashboard { flex: 1; width: 100%; display: none; animation: fadeIn 0.4s ease; }
  .detail-dashboard.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .dash-header { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333; }
  .dash-title { font-family: var(--font-serif); font-size: 32px; color: var(--gold); }
  .dash-desc { font-size: 15px; color: #ccc; margin-top: 10px; text-align: justify; }

  /* Grid for Parallel History */
  .history-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
  @media (min-width: 900px) { .history-grid { grid-template-columns: 1.5fr 1fr 1fr; gap: 25px; } }

  .hist-col { background: var(--bg-panel); border-radius: 8px; padding: 20px; border-top: 3px solid; }
  .col-cn { border-color: var(--cn-color); }
  .col-jp { border-color: var(--jp-color); }
  .col-wl { border-color: var(--wl-color); }
  
  .col-title { font-family: var(--font-serif); font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
  .col-cn .col-title { color: var(--cn-color); }
  .col-jp .col-title { color: var(--jp-color); }
  .col-wl .col-title { color: var(--wl-color); }

  /* Mini Timeline inside columns (for Emperors & Events) */
  .mini-timeline { border-left: 1px solid #444; margin-left: 5px; padding-left: 15px; margin-bottom: 20px; }
  .mini-event { position: relative; margin-bottom: 12px; }
  .mini-event::before { content: ''; position: absolute; left: -19.5px; top: 6px; width: 8px; height: 8px; border-radius: 50%; background: #666; }
  .col-cn .mini-event::before { background: var(--cn-color); }
  
  .m-year { font-size: 11px; color: var(--gold); font-weight: 600; letter-spacing: 0.5px; }
  .m-text { font-size: 14px; color: #ddd; margin-top: 2px; }
  .m-emp { font-weight: 700; color: #fff; }

  .text-block { font-size: 14px; color: #bbb; text-align: justify; margin-bottom: 15px; }

  /* Art Section & Image Upload */
  .art-section { margin-top: 10px; }
  .art-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
  
  .art-card { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
  
  .art-img-wrap { width: 100%; aspect-ratio: 16/9; background: #222; position: relative; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .art-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; z-index: 2; }
  .art-img-wrap:hover img { transform: scale(1.05); }
  
  /* Upload overlay */
  .upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 3; font-size: 12px; }
  .art-img-wrap:hover .upload-overlay { opacity: 1; }
  .no-img-text { position: absolute; z-index: 1; color: #666; font-size: 13px; text-align: center; }

  .art-info { padding: 12px; }
  .art-name { font-family: var(--font-serif); font-size: 15px; font-weight: 600; color: #fff; }
  .art-desc { font-size: 12px; color: #aaa; margin-top: 4px; }

  /* Hidden file input */
  #imageUploader { display: none; }
</style>
</head>
<body>

<header>
  <h1>藝觀 ARTVUE</h1>
  <p>中國主軸 ✕ 同期世界與日本對照 ✕ 藝術史</p>
</header>

<div class="container">
  <div class="master-timeline" id="masterTimeline">
    </div>

  <div class="detail-dashboard" id="dashboard">
    </div>
</div>

<input type="file" id="imageUploader" accept="image/*">

<script>
// ==========================================
// 1. 歷史資料庫 (元、明、清分開，詳細精確年份)
// ==========================================
const HISTORY_DATA = [
  {
    id: 'shang-zhou', year: 'c.2100 - 221 BC', name: '夏・商・周',
    desc: '中國文明的奠基期。商朝確立祭祀國家形態，青銅技術達頂峰。東周迎來「百家爭鳴」的哲學黃金時代。',
    cn: {
      emperors: [{y: '前1046', t: '周武王建立西周'}, {y: '前770', t: '周平王東遷(春秋開始)'}],
      events: [{y: '前14世紀', t: '盤庚遷殷，甲骨文成熟'}, {y: '前356', t: '商鞅變法'}],
      art: { name: '后母戊鼎 (商)', desc: '迄今出土最大最重的青銅禮器，代表商代青銅鑄造巔峰。', img: '' }
    },
    jp: '【繩文～彌生初期】<br>以狩獵採集為主，製作獨特的繩紋陶器。約西元前3世紀，亞洲大陸傳入水稻與金屬器，逐漸過渡至農耕社會。',
    wl: '【軸心時代】<br>古埃及建神廟；古巴比倫頒布《漢摩拉比法典》。隨後希臘城邦發展，羅馬建城，印度佛教創立，東西方哲學同步爆發。'
  },
  {
    id: 'qin-han', year: '221 BC - 220 AD', name: '秦・漢',
    desc: '秦始皇完成首次大一統。漢武帝打通絲路，中西方首次大規模交流。漢代陵墓藝術展現了宏大的宇宙觀。',
    cn: {
      emperors: [{y: '前221', t: '秦始皇統一天下'}, {y: '前141-前87', t: '漢武帝在位(鼎盛)'}],
      events: [{y: '前138', t: '張騫出使西域(開闢絲路)'}, {y: '105', t: '蔡倫改進造紙術'}],
      art: { name: '秦始皇兵馬俑', desc: '八千件真人大小陶俑，面容各異，展現強大國家動員力。', img: '' }
    },
    jp: '【彌生時代中後期】<br>出現早期國家型態。西元57年，漢光武帝賜日本使節「漢委奴國王」金印，確立早期外交朝貢關係。',
    wl: '【羅馬帝國擴張】<br>羅馬共和國轉型為帝國，迎來「羅馬和平」。基督教誕生。羅馬與漢朝並列歐亞大陸兩大超級強權。'
  },
  {
    id: 'tang', year: '618 - 907', name: '唐',
    desc: '中國史上最開放的黃金時代。長安為世界最大都會，詩歌、書法與人物畫皆達到歷史最高峰。',
    cn: {
      emperors: [{y: '626-649', t: '唐太宗(貞觀之治)'}, {y: '690-705', t: '武則天(唯一女皇)'}, {y: '712-756', t: '唐玄宗(開元盛世)'}],
      events: [{y: '627', t: '玄奘西行印度'}, {y: '755', t: '安史之亂(由盛轉衰)'}],
      art: { name: '唐三彩馬', desc: '黃、綠、白三色釉陶，造型雄健，反映大唐吸收西域文化的自信。', img: '' }
    },
    jp: '【飛鳥～平安初期】<br>推進「大化革新」，全面學習唐朝律令制與佛教。頻繁派遣「遣唐使」，並編纂《萬葉集》。',
    wl: '【阿拉伯帝國崛起】<br>伊斯蘭教創立並迅速擴張，形成橫跨歐亞非的阿拉伯帝國。歐洲則處於中世紀前期（查理曼帝國）。'
  },
  {
    id: 'song', year: '960 - 1279', name: '宋',
    desc: '經濟與文化最精緻繁榮的時代。文人階層崛起，確立山水畫哲學意境；宋瓷追求極簡冰清的美學。',
    cn: {
      emperors: [{y: '960', t: '宋太祖趙匡胤建宋'}, {y: '1100-1126', t: '宋徽宗(藝術皇帝)'}],
      events: [{y: '1069', t: '王安石變法'}, {y: '1127', t: '靖康之難，南宋建立'}],
      art: { name: '汝窯天青釉水仙盆', desc: '宋代五大名窯之首，釉色「雨過天青」，為中國陶瓷極簡美學巔峰。', img: '' }
    },
    jp: '【平安中後期～鎌倉】<br>國風文化繁榮，紫式部著《源氏物語》。12世紀末源平合戰後建立鎌倉幕府，武士階級正式掌權。',
    wl: '【十字軍與大學興起】<br>歐洲發動多次十字軍東征，促進東西貿易。博洛尼亞、巴黎、牛津等歐洲最早的大學在此時建立。'
  },
  {
    id: 'yuan', year: '1271 - 1368', name: '元',
    desc: '蒙古帝國打通歐亞大陸，促進全球貿易。引入中東鈷料誕生「青花瓷」，徹底改變世界陶瓷史。',
    cn: {
      emperors: [{y: '1271-1294', t: '元世祖忽必烈'}],
      events: [{y: '1279', t: '崖山海戰，滅南宋統一天下'}, {y: '1275', t: '馬可波羅抵達中國(存疑)'}],
      art: { name: '元青花梅瓶', desc: '白底藍花的對比震撼世界，成為外銷主力，深刻影響中東與歐洲審美。', img: '' }
    },
    jp: '【鎌倉末期～室町初期】<br>成功抵禦元軍兩次入侵（文永/弘安之役，神風傳說）。隨後鎌倉幕府滅亡，進入南北朝動亂期。',
    wl: '【蒙古西征與黑死病】<br>蒙古帝國橫掃歐亞，建立四大汗國，形成「蒙古和平」。14世紀中葉，黑死病席捲歐洲，造成人口銳減。'
  },
  {
    id: 'ming', year: '1368 - 1644', name: '明',
    desc: '恢復漢族傳統，展現強大航海實力（鄭和），建成紫禁城。晚期資本主義萌芽，王陽明心學影響深遠。',
    cn: {
      emperors: [
        {y: '1368-1398', t: '明太祖朱元璋(建國)'}, 
        {y: '1402-1424', t: '明成祖朱棣(永樂盛世)'},
        {y: '1572-1620', t: '明神宗朱翊鈞(萬曆怠政)'},
        {y: '1627-1644', t: '明思宗朱由檢(崇禎亡國)'}
      ],
      events: [
        {y: '1405-1433', t: '鄭和七下西洋'},
        {y: '1420', t: '北京故宮(紫禁城)落成'},
        {y: '1449', t: '土木堡之變(皇帝被俘)'},
        {y: '1581', t: '張居正實施一條鞭法'}
      ],
      art: { name: '明代家具與宣德爐', desc: '明式家具以簡潔流暢的線條著稱，體現文人品味；宣德爐則為銅器鑄造的珍品。', img: '' }
    },
    jp: '【室町～安土桃山時代】<br>水墨畫（雪舟）達巔峰；千利休確立「侘寂」茶道。經歷戰國時代的激烈動盪後，由織田信長與豐臣秀吉推動統一大業。',
    wl: '【文藝復興與大航海】<br>義大利文藝復興（達文西、米開朗基羅）開花結果。1492年哥倫布發現美洲，開啟全球化與歐洲殖民時代。'
  },
  {
    id: 'qing', year: '1644 - 1912', name: '清',
    desc: '中國最後的帝制王朝。康雍乾時期國力鼎盛，宮廷工藝繁縟奢華。西方傳教士帶來透視法，促成中西藝術交融。',
    cn: {
      emperors: [
        {y: '1661-1722', t: '康熙帝(平三藩、收台灣)'}, 
        {y: '1722-1735', t: '雍正帝(設軍機處，集權巔峰)'},
        {y: '1736-1795', t: '乾隆帝(十全武功，極盛轉衰)'},
        {y: '1875-1908', t: '光緒帝(慈禧太后實際掌權)'}
      ],
      events: [
        {y: '1644', t: '清軍入關，定都北京'},
        {y: '1773', t: '下令編纂《四庫全書》'},
        {y: '1840', t: '第一次鴉片戰爭爆發'},
        {y: '1894', t: '甲午戰爭'},
        {y: '1911', t: '辛亥革命爆發'}
      ],
      art: { name: '郎世寧《百駿圖》與粉彩瓷', desc: '義大利傳教士郎世寧融合西方光影與中國筆墨；乾隆時期釉彩技術達極限，風格極盡繁縟華麗。', img: '' }
    },
    jp: '【江戶時代～明治維新】<br>德川幕府實行鎖國，發展出「浮世繪」等庶民文化。1868年面對西方黑船叩關，展開「明治維新」，迅速全盤西化成為強國。',
    wl: '【科學與工業革命】<br>牛頓發表萬有引力；英國爆發工業革命；美國獨立與法國大革命帶來民主思潮。西方憑科技與堅船利砲確立全球霸權。'
  }
];

// ==========================================
// 2. 介面渲染邏輯
// ==========================================
const timelineEl = document.getElementById('masterTimeline');
const dashboardEl = document.getElementById('dashboard');

// 儲存使用者上傳的臨時圖片 URL
const userImages = {}; 

function init() {
  renderTimeline();
  // 預設展開「明朝」，展示複雜資料
  selectEra('ming');
}

function renderTimeline() {
  timelineEl.innerHTML = '';
  HISTORY_DATA.forEach(era => {
    const node = document.createElement('div');
    node.className = 'time-node';
    node.id = `node-${era.id}`;
    node.onclick = () => selectEra(era.id);
    
    node.innerHTML = `
      <div class="node-year">${era.year}</div>
      <div class="node-title">${era.name}</div>
    `;
    timelineEl.appendChild(node);
  });
}

function selectEra(id) {
  // 更新左側 Active 狀態
  document.querySelectorAll('.time-node').forEach(n => n.classList.remove('active'));
  document.getElementById(`node-${id}`).classList.add('active');

  // 取得資料
  const data = HISTORY_DATA.find(e => e.id === id);
  if(!data) return;

  // 生成迷你時間軸 HTML
  const generateMiniTimeline = (items) => {
    return items.map(item => `
      <div class="mini-event">
        <div class="m-year">${item.y}</div>
        <div class="m-text">${item.t}</div>
      </div>
    `).join('');
  };

  const imgSource = userImages[id] || data.cn.art.img;
  
  // 渲染右側 Dashboard
  dashboardEl.classList.remove('show');
  
  setTimeout(() => {
    dashboardEl.innerHTML = `
      <div class="dash-header">
        <div class="dash-title">${data.name} <span style="font-size:16px; color:#888;">(${data.year})</span></div>
        <div class="dash-desc">${data.desc}</div>
      </div>

      <div class="history-grid">
        <div class="hist-col col-cn">
          <div class="col-title">🇨🇳 中國歷史與藝術</div>
          
          <div style="display:flex; gap:20px; flex-wrap:wrap;">
            <div style="flex:1; min-width:140px;">
              <div style="font-size:12px; color:#888; margin-bottom:8px;">👑 重要君王</div>
              <div class="mini-timeline">${generateMiniTimeline(data.cn.emperors)}</div>
            </div>
            <div style="flex:1; min-width:140px;">
              <div style="font-size:12px; color:#888; margin-bottom:8px;">📜 重大事件</div>
              <div class="mini-timeline">${generateMiniTimeline(data.cn.events)}</div>
            </div>
          </div>

          <div class="art-section">
            <div class="art-title">🏺 代表藝術</div>
            <div class="art-card">
              <div class="art-img-wrap" onclick="triggerUpload('${id}')">
                <div class="no-img-text">無圖片<br>點擊上傳預覽</div>
                ${imgSource ? `<img src="${imgSource}" alt="art">` : ''}
                <div class="upload-overlay">
                  <span>📸 點擊從本機上傳圖片</span>
                  <span style="font-size:9px; margin-top:4px;">(僅限本次瀏覽預覽)</span>
                </div>
              </div>
              <div class="art-info">
                <div class="art-name">${data.cn.art.name}</div>
                <div class="art-desc">${data.cn.art.desc}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="hist-col col-jp">
          <div class="col-title">🇯🇵 同期日本</div>
          <div class="text-block">${data.jp}</div>
        </div>

        <div class="hist-col col-wl">
          <div class="col-title">🌍 同期世界</div>
          <div class="text-block">${data.wl}</div>
        </div>
      </div>
    `;
    dashboardEl.classList.add('show');
    
    // 手機版自動往下捲動到內容區
    if(window.innerWidth < 900) {
      dashboardEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 50);
}

// ==========================================
// 3. 本機圖片上傳預覽邏輯 (無須伺服器)
// ==========================================
let currentUploadEraId = null;
const uploader = document.getElementById('imageUploader');

function triggerUpload(eraId) {
  currentUploadEraId = eraId;
  uploader.click();
}

uploader.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  // 使用 FileReader 將本機圖片轉為可顯示的 DataURL
  const reader = new FileReader();
  reader.onload = function(event) {
    const imageUrl = event.target.result;
    // 存入暫存字典
    userImages[currentUploadEraId] = imageUrl;
    // 重新渲染當前畫面以顯示圖片
    selectEra(currentUploadEraId);
  };
  reader.readAsDataURL(file);
  
  // 清空 input 讓下次選同一張圖也能觸發 change
  this.value = '';
});

// 啟動
init();
</script>
</body>
</html>
